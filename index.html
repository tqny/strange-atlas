<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strange Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="map-canvas"></canvas>

  <header id="wordmark">
    <h1>Strange Atlas</h1>
  </header>

  <aside id="controls">
    <div id="category-toggles"></div>
  </aside>

  <footer id="atlas-panel">
    <p id="atlas-text">354,770 phenomena. 14 categories. Select one to begin.</p>
  </footer>

  <div id="tooltip" class="hidden">
    <div id="tooltip-name"></div>
    <div id="tooltip-meta"></div>
    <div id="tooltip-desc"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
